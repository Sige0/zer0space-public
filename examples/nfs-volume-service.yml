# Example: A stateless Swarm service backed by an NFS volume
#
# Pattern: the Swarm holds no persistent data. Any service that needs to
# write data mounts a volume from a central NFS server instead of a local
# bind-mount. Because the data doesn't live on any particular node's disk,
# the service needs no node-placement constraint — it can be scheduled on
# any Swarm node (or rescheduled after one is wiped and rejoined) and it
# will see exactly the same data every time.
#
# This replaces an older "pin the service to the node that holds the
# bind-mount" pattern. That pattern is still correct for services running
# OUTSIDE the Swarm on genuinely stateful, non-disposable hosts (e.g. a
# database that wants real local disk) — but inside the Swarm, NFS removes
# the need for it entirely.
#
# Prerequisites:
#   1. An NFS server reachable from every Swarm node (in this setup:
#      a dedicated storage host, not a Swarm member).
#   2. The `nfs-common` package installed on every Swarm node
#      (`apt install nfs-common` on Debian) so the `local` volume driver
#      can mount NFS shares.
#   3. An export on the NFS server for this service's data, e.g.
#      /srv/nfs/swarm-data/myapp, with the UID/GID or no_root_squash
#      settings your NFS server's export policy requires.

networks:
  myapp_net:
    driver: overlay
    attachable: false   # internal only — no manual container attachment

volumes:
  myapp_data:
    driver: local
    driver_opts:
      type: nfs
      o: "addr=<NFS_SERVER_IP>,nolock,soft,rw"
      device: ":/srv/nfs/swarm-data/myapp"

services:

  # ── Application ───────────────────────────────────────────────────────────
  app:
    image: your-app-image:latest
    ports:
      - target: 3000
        published: 8080
        mode: host          # host mode avoids Swarm's routing mesh; useful when
                            # you want to address the specific node's port directly
    volumes:
      - myapp_data:/data    # NFS-backed — no node placement constraint needed
    networks:
      - myapp_net
    environment:
      - TZ=Europe/Zurich
      - DATA_DIR=/data
    deploy:
      replicas: 1
      # No `placement.constraints` here on purpose: the volume lives on the
      # NFS server, not on any individual node, so this service can start
      # on — or be rescheduled to — any node in the Swarm without losing
      # its data.
      restart_policy:
        condition: on-failure
        delay: 5s
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
        reservations:
          cpus: "0.05"
          memory: 64M

  # ── Read-only Docker socket proxy ─────────────────────────────────────────
  # Exposes only the Swarm API endpoints the app needs.
  # The app never touches /var/run/docker.sock directly.
  socketproxy:
    image: tecnativa/docker-socket-proxy:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      # Allow only what the app actually uses. Everything else defaults to 0.
      - SERVICES=1
      - NODES=1
      - TASKS=1
      # Explicitly deny write-capable endpoints.
      - POST=0
      - AUTH=0
      - CONTAINERS=0
      - IMAGES=0
      - NETWORKS=0
      - VOLUMES=0
    networks:
      - myapp_net          # isolated: no internet access, no other stacks
    deploy:
      replicas: 1
      # Also stateless — carries no data of its own, so it needs no
      # placement constraint either.
      resources:
        limits:
          cpus: "0.10"
          memory: 64M
        reservations:
          cpus: "0.01"
          memory: 16M
